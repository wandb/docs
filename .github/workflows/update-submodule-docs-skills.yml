name: Update docs-skills submodule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.DOCS_SKILLS_PAT }}
        submodules: true

    - name: Update submodule to latest
      run: |
        git submodule update --remote .claude

    - name: Check for changes
      id: check-changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          NEW_SHA=$(git -C .claude rev-parse --short HEAD)
          echo "new_sha=${NEW_SHA}" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: steps.check-changes.outputs.has_changes == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        base: main
        commit-message: "chore: Update docs-skills submodule to ${{ steps.check-changes.outputs.new_sha }}"
        title: "Update docs-skills submodule to ${{ steps.check-changes.outputs.new_sha }}"
        draft: false
        body: |
          Updates the `.claude` submodule ([coreweave/docs-skills](https://github.com/coreweave/docs-skills)) to the latest upstream commit.

          ---
          *This PR was automatically generated by the docs-skills submodule update workflow.*
        branch: update-submodule-docs-skills
        delete-branch: true
        labels: |
          dependencies
          auto-generated
