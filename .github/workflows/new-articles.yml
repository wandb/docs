name: Update new articles log

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many days of merged PRs to scan"
        required: false
        default: "8"
  schedule:
    # Run weekly on Fridays at 4:00 PM UTC
    - cron: '0 16 * * 5'

jobs:
  update-new-articles:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      # Shallow clone - the script reads article frontmatter from the working
      # tree and queries the GitHub API for PR history

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Generate timestamp
      id: timestamp
      run: |
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

    - name: Update new articles page
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        LOOKBACK_DAYS: ${{ inputs.lookback_days || '8' }}
      run: |
        python scripts/new-articles/update_new_articles.py

    - name: Check for changes
      id: check-changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected in repository"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        fi

    - name: Create Pull Request
      if: steps.check-changes.outputs.has_changes == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        base: main
        commit-message: "chore: Update new articles log"
        title: "Update new articles log"
        draft: true
        body: |
          This PR adds the past week's newly published articles to the
          [New articles](https://docs.wandb.ai/release-notes/new-articles/) page.

          **Generated on**: ${{ steps.timestamp.outputs.timestamp }}

          ### Review Checklist
          - [ ] Verify each listed article is a real, intentionally published page
          - [ ] Remove any entries that shouldn't be showcased (internal pages, stubs)
          - [ ] Check that titles and descriptions read well in list form

          ---
          *This PR was automatically generated by the new articles log workflow.*
        branch: new-articles-log-${{ github.run_number }}
        delete-branch: true
        labels: |
          documentation
          automated

    - name: Display Result
      run: |
        if [ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]; then
          if [ -n "${{ steps.create-pr.outputs.pull-request-number }}" ]; then
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ steps.create-pr.outputs.pull-request-number }}"
            echo "::notice title=Pull Request Created::A PR has been created with this week's new articles: $PR_URL"
          fi
        else
          echo "::notice title=No Updates Needed::No new articles were published this week"
        fi
