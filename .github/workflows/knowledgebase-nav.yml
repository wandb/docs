# ------------------------------------------------------------------
# Knowledgebase Nav
# ------------------------------------------------------------------
#
# What this workflow does
# -----------------------
# Runs the DocEngine `knowledgebase` subsystem (`docengine knowledgebase apply`)
# from the embedded engine submodule. It crawls support articles under
# support/<product>/articles/, then regenerates tag pages, product index pages,
# the auto-generated <Badge> footer on each article, and the counts/featured
# blocks on support.mdx. It never edits docs.json. When the set of tag pages
# changes, the PR comment lists the page ids a human must add to or remove from
# each "Support: <display_name>" tab in docs.json by hand. Config lives in
# docengine-site/knowledgebase.yaml; the two MDX templates live in
# docengine-site/templates/. See the engine's docs/knowledgebase/README.md.
#
# Engine, not a bundled script
# ----------------------------
# The generator logic now lives in the (private) coreweave/docengine submodule,
# pinned by this repo. Because that submodule is private, FORK PRs cannot clone
# it — so this job runs only for same-repo PRs and manual dispatch. Fork PRs are
# regenerated by a maintainer after merge (or the contributor runs the engine
# locally). This is the one deliberate behavior change from the former bundled
# script, which could generate (but never push) on forks.
#
# Auth
# ----
#   - Commit-back push + PR comment: the wandb-docs-pr-writer GitHub App (same as
#     docengine-build.yml). The output commit is pushed with the App token (NOT
#     GITHUB_TOKEN) so it triggers the host's validation workflows.
#   - Engine submodule checkout (PRIVATE coreweave/docengine): DOCENGINE_TOKEN via
#     url.insteadOf.
#
# PR comment vs auto-commit
# -------------------------
# After this workflow pushes the chore commit below, GitHub starts a second run
# (synchronize). We skip the PR comment step when the checked-out HEAD is exactly
# that chore commit so the report is not re-posted on the no-op run.
# ------------------------------------------------------------------

name: Knowledgebase Nav

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "support/**"
      - "docengine-site/knowledgebase.yaml"
      - "docengine-site/templates/support_tag.mdx.j2"
      - "docengine-site/templates/support_product_index.mdx.j2"
      - "docengine"

  workflow_dispatch:
    inputs:
      branch:
        description: >
          Optional branch to check out and push regenerated files to. When empty,
          a manual run generates and writes the job summary but does not commit.
        required: false
        default: ""

concurrency:
  group: knowledgebase-nav-${{ github.ref }}
  cancel-in-progress: true

# Pushes use the GitHub App token (contents write on the installation). The
# workflow GITHUB_TOKEN stays read-only for contents; pull-requests: write for
# the gh PR comment.
permissions:
  contents: read
  pull-requests: write

jobs:
  generate-tags:
    name: Generate tag pages and update navigation
    runs-on: ubuntu-latest
    # Generation needs the private coreweave/docengine submodule (fork PRs cannot
    # read it) and the wandb-docs-pr-writer App credentials to push the commit back.
    # Dependabot PRs run with a restricted token and cannot see the secrets/vars
    # contexts, so the credential guard below would always fail — skip the job for
    # them too. Same-repo non-Dependabot PRs and manual runs only; Dependabot and
    # fork PRs are regenerated by a maintainer after merge.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]') }}
    steps:
      - name: Require app credentials
        run: |
          if [ -z "${{ vars.DOCS_PR_WRITER_CLIENT_ID }}" ] || [ -z "${{ secrets.DOCS_PR_WRITER_PRIVATE_KEY }}" ]; then
            echo "::error::DOCS_PR_WRITER_CLIENT_ID (variable) and DOCS_PR_WRITER_PRIVATE_KEY (secret) must be set."
            exit 1
          fi

      - name: Generate token for wandb-docs-pr-writer
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DOCS_PR_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.DOCS_PR_WRITER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # On a PR, check out the head branch so the commit-back pushes to it.
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}
          # App token persists as the push credential for the commit-back below.
          token: ${{ steps.app_token.outputs.token }}

      - name: Authenticate git for the private coreweave docengine submodule
        env:
          TOKEN: ${{ secrets.DOCENGINE_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Initialize the engine submodule (docengine only; skip .claude)
        run: git submodule update --init --depth 1 docengine

      - name: Detect chore-only navigation commit (skip PR comment on next run)
        id: nav_commit
        if: github.event_name == 'pull_request'
        run: |
          CHORE_SUBJECT="chore: regenerate support tag pages"
          FIRST="$(git log -1 --pretty=%B | head -n1)"
          if [ "${FIRST}" = "${CHORE_SUBJECT}" ]; then
            echo "is_auto_nav_commit=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_auto_nav_commit=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install DocEngine from the submodule
        run: pip install -e ./docengine

      # Writes tag pages / product indexes / article footers / support.mdx in place
      # at the repo root (output_subpath: .). Writes the PR-comment markdown to a file
      # only when there is something to report.
      - name: Regenerate knowledgebase navigation
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          docengine knowledgebase apply \
            --report-file "${RUNNER_TEMP}/kb-report.md" \
            --run-url "${RUN_URL}" \
            --run-id "${GITHUB_RUN_ID}"

      - name: Detect knowledgebase report
        id: kb_report
        if: always()
        run: |
          if [ -s "${RUNNER_TEMP}/kb-report.md" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
          fi

      # Upsert a single PR comment, identified by the engine's HTML marker
      # (<!-- knowledgebase-nav-report -->), so repeated pushes do not pile up.
      - name: Upsert knowledgebase navigation report on PR
        if: ${{ success() && github.event_name == 'pull_request' && steps.nav_commit.outputs.is_auto_nav_commit != 'true' && steps.kb_report.outputs.present == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- knowledgebase-nav-report -->"
          COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate -q ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          | head -n1)
          if [ -n "${COMMENT_ID}" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -F "body=@${RUNNER_TEMP}/kb-report.md"
          else
            gh pr comment "${PR_NUMBER}" --body-file "${RUNNER_TEMP}/kb-report.md"
          fi

      - name: Write knowledgebase navigation report to job summary
        if: ${{ always() && github.event_name == 'workflow_dispatch' && steps.kb_report.outputs.present == 'true' }}
        run: cat "${RUNNER_TEMP}/kb-report.md" >> "${GITHUB_STEP_SUMMARY}"

      # Stage only the subsystem's output domain (support pages + footers + the root
      # support.mdx). docs.json lives at the repo root — outside these paths — so it is
      # never staged. Pushed with the App token so downstream workflows run.
      - name: Commit generated changes
        if: ${{ success() && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.branch != '')) }}
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          PUSH_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.event.inputs.branch }}
        run: |
          git config user.name 'wandb-docs-pr-writer[bot]'
          git config user.email 'wandb-docs-pr-writer[bot]@users.noreply.github.com'
          git add support support.mdx
          if git diff --cached --quiet; then
            echo "No knowledgebase changes to commit."
          else
            git commit -m "chore: regenerate support tag pages"
            git push origin "HEAD:${PUSH_BRANCH}"
          fi
