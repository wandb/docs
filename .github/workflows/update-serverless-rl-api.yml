name: Update Serverless RL API Documentation

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 9:30 AM UTC (30 minutes after Service API)
    - cron: '30 9 * * 1'
  workflow_call:

jobs:
  update-serverless-rl-api:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      # Shallow clone - no git history needed, only checks git status
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Generate timestamp
      id: timestamp
      run: |
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "Generated at: ${TIMESTAMP}"
        
    - name: Sync OpenAPI Specification
      id: sync-spec
      run: |
        echo "Syncing Serverless RL API specification from remote service..."
        OUTPUT=$(python scripts/reference-generation/serverless-rl/sync_openapi_spec.py 2>&1)
        echo "$OUTPUT"
        
        # Check if spec changed
        if echo "$OUTPUT" | grep -q "Serverless RL API spec has changed"; then
          echo "spec_changed=true" >> $GITHUB_OUTPUT
          echo "Changes detected in Serverless RL API spec"
        else
          echo "spec_changed=false" >> $GITHUB_OUTPUT
          echo "No changes in Serverless RL API spec"
        fi
        
    - name: Update Serverless RL API Landing Page
      if: steps.sync-spec.outputs.spec_changed == 'true'
      run: |
        echo "Updating Serverless RL API landing page with current endpoints..."
        python scripts/reference-generation/serverless-rl/update_training_api_landing.py
        
    - name: Check for changes
      id: check-changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected in repository"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        fi
        
    - name: Create Pull Request
      if: steps.check-changes.outputs.has_changes == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        base: main
        commit-message: "chore: Update Serverless RL API documentation"
        title: "Update Serverless RL API documentation"
        draft: true
        body: |
          This PR updates the Serverless RL API documentation based on the latest OpenAPI specification.
          
          **Generated on**: ${{ steps.timestamp.outputs.timestamp }}
          **OpenAPI spec source**: https://api.training.wandb.ai/openapi.json
          
          ### Changes
          - Synced latest OpenAPI specification from the Serverless RL API service
          - Updated Serverless RL API landing page with current endpoints
          
          ### Review Checklist
          - [ ] Verify new endpoints are correctly listed
          - [ ] Check that removed endpoints (if any) are intentional
          - [ ] Confirm all Serverless RL API links work correctly
          
          ---
          *This PR was automatically generated by the Serverless RL API update workflow.*
        branch: update-serverless-rl-api-${{ github.run_number }}
        delete-branch: true
        labels: |
          documentation
          automated
          serverless-rl-api
    
    - name: Display Result
      run: |
        if [ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]; then
          if [ -n "${{ steps.create-pr.outputs.pull-request-number }}" ]; then
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ steps.create-pr.outputs.pull-request-number }}"
            echo "PR created successfully"
            echo "Review the changes at: $PR_URL"
            echo "::notice title=Pull Request Created::A PR has been created for Serverless RL API updates: $PR_URL"
          fi
        else
          echo "Serverless RL API documentation is up to date"
          echo "::notice title=No Updates Needed::Serverless RL API documentation is already up to date"
        fi
