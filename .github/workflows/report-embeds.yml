name: Report embeds

# Checks live W&B report embeds (<WandbReport>) in docs pages, discovered by
# scanning the .mdx sources. Each run checks placement + URL liveness.
# On PRs it blocks; on the weekly run it files an issue instead (never blocks).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "scripts/report-embeds/**"
      - "snippets/WandbReport.jsx"
      - "**/*.mdx"
  schedule:
    - cron: "17 6 * * 1" # Weekly, Monday 06:17 UTC
  workflow_dispatch:

concurrency:
  group: report-embeds-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write # the weekly run files an issue on failure

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python3 -m unittest discover -s scripts/report-embeds/tests -p 'test_*.py' -v
      - name: Check embeds
        id: check
        # Block PRs; on schedule/dispatch don't fail the run — file an issue below.
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: python3 scripts/report-embeds/check_embeds.py --github --output-md ./embed-report.md
      - name: Create issue from file
        if: github.event_name != 'pull_request' && steps.check.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6
        with:
          title: Fix broken report embeds in docs.wandb.ai
          content-filepath: ./embed-report.md
          labels: report, automated issue
